<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Sistema Compras</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="background"></div>

<div class="login-container">
    <div class="card">
        <img src="../assets/Logo.png" alt="Logo Sistema Compras" class="logo">
        <p>Crie sua conta para continuar</p>

        <input type="text"  id="firstName"   placeholder="Nome">
        <input type="text"  id="lastName"    placeholder="Sobrenome">
        <input type="text"  id="cpf"         placeholder="CPF">
        <input type="text"  id="phoneNumber" placeholder="Telefone (ex: +5511999999999)">
        <input type="email" id="email"       placeholder="Email">
        <input type="password" id="password"        placeholder="Senha">
        <input type="password" id="confirmPassword" placeholder="Confirmar senha">

        <button onclick="cadastrar()" id="btnCadastrar">Cadastrar</button>
        <a href="/html/login.html" class="forgot">← Voltar para o login</a>

        <p id="mensagem"></p>
    </div>
</div>

<script src="../js/cadastro.js"></script>
</body>
</html>
