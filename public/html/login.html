<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Compras</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="background"></div>

<div class="login-container">
    <div class="card">
        <img src="../assets/Logo.png" alt="Logo Sistema Compras" class="logo">
        <p>Realize o login para continuar</p>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">

        <button onclick="login()" id="btnLogin">Entrar</button>
        <a href="#" class="forgot">Esqueci minha senha</a>

        <p id="mensagem"></p>
    </div>
</div>

<script src="../js/login.js"></script>
</body>
</html>
