<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Resetar Senha - Sistema Compras</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="background"></div>

<div class="login-container">
    <div class="card">
        <img src="../assets/Logo.png" alt="Logo Sistema Compras" class="logo">
        <p>Defina sua nova senha</p>

        <input type="text" id="token" placeholder="Token recebido no email">
        <input type="password" id="newPassword" placeholder="Nova senha">
        <input type="password" id="confirmPassword" placeholder="Confirmar senha">

        <button onclick="resetPassword()" id="btnReset">Redefinir senha</button>
        <a href="/html/login.html" class="forgot">← Voltar para o login</a>

        <p id="mensagem"></p>
    </div>
</div>

<script src="../js/reset-password.js"></script>
</body>
</html>
